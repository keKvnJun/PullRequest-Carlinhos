<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Quem está assistindo?</title>
    <link rel="stylesheet" href="perfil.css">
    <link rel="icon" href="img/peixe-japao-azul-removeBG.jpg" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body class="perfis-body">

    <main class="perfis-conteudo">
        <h1 class="titulo-perfis">Escolha um integrante do grupo</h1>

        <div class="lista-perfis">
            
            <a href="giMed.html" class="perfil-item perfil1">
                <div class="avatar-conjunto">
                    <img src="img/giovanna-medeiros.jpeg" alt="Giovanna" class="avatar-imagem">
                </div>
                <div class="nome-perfil">Giovanna</div>
            </a>

            <a href="ricardo.html" class="perfil-item perfil2">
                <div class="avatar-conjunto">
                    <img src="img/ricardo.jpeg" alt="Ricardo" class="avatar-imagem">
                </div>
                <div class="nome-perfil">Ricardo</div>
            </a>

            <a href="dias.html" class="perfil-item perfil3">
                <div class="avatar-conjunto">
                    <img src="img/davi.jpg" alt="Davi Dias" class="avatar-imagem">
                </div>
                <div class="nome-perfil">Davi Dias</div>
            </a>

            <a href="tutu.html" class="perfil-item perfil4">
                <div class="avatar-conjunto">
                    <img src="img/arthur.jpeg" alt="Arthur do Vale" class="avatar-imagem">
                </div>
                <div class="nome-perfil">Arthur do Vale</div>
            </a>

            <a href="murilinho.html" class="perfil-item perfil5">
                <div class="avatar-conjunto">
                    <img src="img/murilo.jpeg" alt="Murilo Rosa" class="avatar-imagem">
                </div>
                <div class="nome-perfil">Murilo Rosa</div>
            </a>

            <a href="kevin.html" class="perfil-item perfil6">
                <div class="avatar-conjunto">
                    <img src="img/kevin.jpg" alt="Kevin Jun" class="avatar-imagem">
                </div>
                <div class="nome-perfil">Kevin Jun</div>
            </a>

            <a href="#" class="perfil-item adicionar-perfil">
                <div class="avatar-conjunto icone-adicionar">
                    <span class="sinal-mais">+</span>
                </div>
                <div class="nome-perfil">Adicionar Perfil</div>
            </a>

        </div>

        <button class="botao-gerenciar">GERENCIAR PERFIS</button>
        
    </main>

</body>
</html>
